<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>藍波健康體能 - 保健品內部報價系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 2px 15px -3px rgba(0,0,0,0.07), 0 4px 6px -2px rgba(0,0,0,0.05); }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <div v-if="!isAuthenticated" class="fixed inset-0 z-[100] bg-blue-900 flex items-center justify-center p-6">
            <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl text-center">
                <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fa-solid fa-lock text-3xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">內部員工系統</h2>
                <p class="text-gray-500 mb-6">請輸入存取密碼以查看報價</p>
                <input v-model="passwordInput" @keyup.enter="checkPassword" type="password" placeholder="請輸入密碼" 
                       class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 focus:outline-none mb-4 text-center text-xl tracking-widest">
                <button @click="checkPassword" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">
                    登入系統
                </button>
                <p v-if="loginError" class="text-red-500 mt-4 text-sm font-medium">密碼錯誤</p>
            </div>
        </div>

        <div v-else>
            <div class="sticky top-0 bg-white/80 backdrop-blur-md z-30 border-b border-gray-100">
                <div class="p-4">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold px-3 py-1 bg-blue-100 text-blue-700 rounded-full">INTERNAL ONLY</span>
                        <button @click="logout" class="text-gray-400 text-sm italic">登出</button>
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
                        <input v-model="searchQuery" type="text" placeholder="搜尋全品項產品或成分..." 
                               class="w-full pl-12 pr-4 py-3 bg-gray-100 border-none rounded-2xl focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div class="flex overflow-x-auto px-4 pb-3 space-x-2 no-scrollbar">
                    <button v-for="cat in allCategories" :key="cat"
                            @click="currentCategory = cat"
                            :class="['whitespace-nowrap px-4 py-1.5 rounded-xl text-sm font-bold transition-all', 
                                     currentCategory === cat ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-white text-gray-500 border border-gray-200']">
                        {{ cat }}
                    </button>
                </div>
            </div>

            <div class="p-4 space-y-4">
                <div v-for="item in filteredProducts" :key="item.name + item.spec" 
                     class="bg-white rounded-2xl p-4 card-shadow border border-white relative overflow-hidden transition-transform active:scale-[0.98]">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span v-if="item.veg" class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-md font-bold italic">🌿 {{ item.veg }}</span>
                                <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-md font-medium">{{ item.spec }}</span>
                            </div>
                            <h3 class="text-lg font-bold text-gray-800 leading-tight">{{ item.name }}</h3>
                        </div>
                        <button @click="copyInfo(item)" class="bg-blue-50 text-blue-600 w-10 h-10 rounded-xl flex items-center justify-center active:bg-blue-600 active:text-white transition-colors">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                    <p class="text-sm text-gray-500 line-clamp-2 mb-4 h-10">{{ item.desc }}</p>
                    <div class="flex items-center justify-between pt-4 border-t border-dashed border-gray-100">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-gray-400 line-through tracking-wider">市價 ${{ item.listPrice }}</span>
                            <span class="text-sm font-bold text-gray-700 italic">末端 ${{ item.sellPrice }}</span>
                            <span class="text-[10px] text-orange-500 font-bold mt-1">獎金 +${{ Math.round(item.sellPrice * 0.1) }}</span>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter">Staff Price</p>
                            <p class="text-2xl font-black text-blue-600 tracking-tighter">${{ item.staffPrice }}</p>
                        </div>
                    </div>
                </div>
            </div>

                </div>
            </transition>
        </div>
    </div>

                        { cat: '護眼腦力', name: '藻紅素', spec: '60粒', veg: '全素', desc: '德國頂級藻紅素+亞麻仁油，守護明亮', listPrice: 2280, sellPrice: 1800, staffPrice: 1140 },

                        { cat: '外用日常', name: '沙棘護理凝膠（小）', spec: '25ml', veg: '', desc: '隨身攜帶，隨時護理', listPrice: 499, sellPrice: 350, staffPrice: 250 },

                        { cat: '外用日常', name: '義大利精油口含錠', spec: '30錠', veg: '', desc: '義大利甘草精油，清新口氣', listPrice: 120, sellPrice: 100, staffPrice: 60 },

                        { cat: '外用日常', name: '天然維生素B群', spec: '60粒', veg: '全素', desc: '天然酵母B群，活力補給', listPrice: 1280, sellPrice: 900, staffPrice: 640 },
                        { cat: '外用日常', name: '亞麻仁油', spec: '60粒', veg: '', desc: '素食魚油，Omega-3好油補充', listPrice: 1980, sellPrice: 1000, staffPrice: 990 },
                        { cat: '外用日常', name: '五行草本完全營養素', spec: '30包', veg: '', desc: '30種蔬果草本，全方位營養補給', listPrice: 1980, sellPrice: 1200, staffPrice: 990 }
                    ]
                }
            },
            computed: {
                filteredProducts() {
                    let list = this.products;
                    if (this.currentCategory !== '全部產品') list = list.filter(p => p.cat === this.currentCategory);
                    if (this.searchQuery) {
                        const q = this.searchQuery.toLowerCase();
                        list = list.filter(p => p.name.includes(q) || p.desc.includes(q));
                    }
                    return list;
                }
            },
            methods: {
                checkPassword() {
                    if (this.passwordInput === this.correctPassword) {
                        this.isAuthenticated = true;
                        localStorage.setItem('isLogged', 'true');
                    } else {
                        this.loginError = true;
                    }
                },
                logout() {
                    this.isAuthenticated = false;
                    localStorage.removeItem('isLogged');
                },
                copyInfo(item) {
                    const text = `【${item.name}】\n規格：${item.spec}\n特色：${item.desc}\n末端售價：$${item.sellPrice}`;
                    navigator.clipboard.writeText(text);
                    this.showToast = true;
                    setTimeout(() => this.showToast = false, 2500);
                }
            },
            mounted() {
                if (localStorage.getItem('isLogged') === 'true') this.isAuthenticated = true;
            }
        }).mount('#app')
    </script>
</body>
</html>
